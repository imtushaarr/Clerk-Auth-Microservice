# Development override — mounts source code for live-reload.
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# WARNING: Do NOT use in production. The volume mount exposes source code
# and any .env files inside the container.
version: '3.8'

services:
  app:
    build:
      context: .
      target: builder
    command: npm run dev
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./next.config.js:/app/next.config.js
      - ./tailwind.config.ts:/app/tailwind.config.ts
      - ./postcss.config.js:/app/postcss.config.js
      - ./tsconfig.json:/app/tsconfig.json
    environment:
      - NODE_ENV=development
