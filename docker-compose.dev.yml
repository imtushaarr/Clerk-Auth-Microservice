version: '3.8'

# Development configuration with hot-reload support.
# Use: docker-compose -f docker-compose.dev.yml up

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - CLERK_WEBHOOK_SECRET=${CLERK_WEBHOOK_SECRET}
      - TESTMAIL_NAMESPACE=${TESTMAIL_NAMESPACE}
      - TESTMAIL_API_KEY=${TESTMAIL_API_KEY}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    volumes:
      # Only mount source code — not .env files or node_modules
      - ./src:/app/src:ro
      - ./public:/app/public:ro
    restart: unless-stopped
    command: npm run dev
